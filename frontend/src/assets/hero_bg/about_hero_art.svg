<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 280" width="1600" height="280">
  <defs>
    <linearGradient id="aboutGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="50%" stop-color="#1c2541"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="blueGlowAbout" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glowAbout" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1600" height="280" fill="url(#aboutGrad)"/>

  <!-- Orbs -->
  <circle cx="360" cy="140" r="150" fill="#2563eb" opacity="0.35" filter="url(#glowAbout)"/>
  <circle cx="800" cy="140" r="160" fill="#1d4ed8" opacity="0.25" filter="url(#glowAbout)"/>
  <circle cx="1240" cy="140" r="150" fill="#3b82f6" opacity="0.35" filter="url(#glowAbout)"/>

  <!-- Grid -->
  <g stroke="#38bdf8" stroke-width="1" opacity="0.2">
    <line x1="0" y1="70" x2="1600" y2="70"/>
    <line x1="0" y1="140" x2="1600" y2="140"/>
    <line x1="0" y1="210" x2="1600" y2="210"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="550" y1="0" x2="550" y2="280"/>
    <line x1="800" y1="0" x2="800" y2="280"/>
    <line x1="1050" y1="0" x2="1050" y2="280"/>
    <line x1="1300" y1="0" x2="1300" y2="280"/>
  </g>

  <!-- Waves -->
  <path d="M 0 110 Q 400 170 800 110 T 1600 130" fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.6" filter="url(#glowAbout)"/>
  <path d="M 0 170 Q 400 100 800 170 T 1600 120" fill="none" stroke="#38bdf8" stroke-width="2.5" opacity="0.75" filter="url(#glowAbout)"/>

  <!-- Left Side Shield Icon (Safe Position X=320, Y=90) -->
  <g transform="translate(320, 90)">
    <path d="M45,6 L80,22 L80,62 C80,85 45,100 45,100 C45,100 10,85 10,62 L10,22 Z" fill="url(#blueGlowAbout)" opacity="0.5" stroke="#60a5fa" stroke-width="2.5" filter="url(#glowAbout)"/>
    <polygon points="45,30 50,43 64,45 53,54 56,68 45,60 34,68 37,54 26,45 40,43" fill="#93c5fd" opacity="0.95"/>
  </g>

  <!-- Right Side Compass Icon (Safe Position X=1120, Y=90) -->
  <g transform="translate(1120, 90)">
    <circle cx="50" cy="50" r="48" fill="#0f172a" stroke="#60a5fa" stroke-width="3" opacity="0.95" filter="url(#glowAbout)"/>
    <polygon points="50,14 57,41 84,50 57,59 50,86 43,59 16,50 43,41" fill="#38bdf8" opacity="0.85"/>
  </g>

  <!-- Particles -->
  <circle cx="500" cy="110" r="5" fill="#60a5fa" filter="url(#glowAbout)"/>
  <circle cx="650" cy="180" r="6" fill="#38bdf8" filter="url(#glowAbout)"/>
  <circle cx="950" cy="110" r="5" fill="#93c5fd" filter="url(#glowAbout)"/>
</svg>
