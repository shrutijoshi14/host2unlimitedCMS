<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 280" width="1600" height="280">
  <defs>
    <linearGradient id="caseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#061e36"/>
      <stop offset="50%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cyanGlowCase" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glowCase" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1600" height="280" fill="url(#caseGrad)"/>

  <!-- Orbs -->
  <circle cx="360" cy="140" r="150" fill="#0284c7" opacity="0.35" filter="url(#glowCase)"/>
  <circle cx="800" cy="140" r="160" fill="#38bdf8" opacity="0.25" filter="url(#glowCase)"/>
  <circle cx="1240" cy="140" r="150" fill="#0369a1" opacity="0.35" filter="url(#glowCase)"/>

  <!-- Grid -->
  <g stroke="#38bdf8" stroke-width="1" opacity="0.2">
    <line x1="0" y1="70" x2="1600" y2="70"/>
    <line x1="0" y1="140" x2="1600" y2="140"/>
    <line x1="0" y1="210" x2="1600" y2="210"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="550" y1="0" x2="550" y2="280"/>
    <line x1="800" y1="0" x2="800" y2="280"/>
    <line x1="1050" y1="0" x2="1050" y2="280"/>
    <line x1="1300" y1="0" x2="1300" y2="280"/>
  </g>

  <!-- Waves -->
  <path d="M 0 110 Q 400 170 800 110 T 1600 130" fill="none" stroke="#38bdf8" stroke-width="3" opacity="0.75" filter="url(#glowCase)"/>
  <path d="M 0 170 Q 450 100 900 170 T 1600 120" fill="none" stroke="#7dd3fc" stroke-width="2.5" opacity="0.8" filter="url(#glowCase)"/>

  <!-- Left Side Bar Chart Icon (Safe Position X=320, Y=94) -->
  <g transform="translate(320, 94)">
    <rect x="0" y="0" width="115" height="92" fill="#0f172a" stroke="#38bdf8" stroke-width="2.5" rx="8" opacity="0.95"/>
    <rect x="14" y="48" width="12" height="32" fill="#0284c7" rx="2"/>
    <rect x="36" y="34" width="12" height="46" fill="#0ea5e9" rx="2"/>
    <rect x="58" y="18" width="12" height="62" fill="#38bdf8" rx="2" filter="url(#glowCase)"/>
    <rect x="80" y="8" width="12" height="72" fill="#7dd3fc" rx="2" filter="url(#glowCase)"/>
  </g>

  <!-- Right Side Success Badge Icon (Safe Position X=1120, Y=92) -->
  <g transform="translate(1120, 92)">
    <circle cx="48" cy="48" r="45" fill="#0f172a" stroke="#38bdf8" stroke-width="2.5" opacity="0.95"/>
    <path d="M28,52 L39,64 L67,36" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowCase)"/>
  </g>

  <!-- Particles -->
  <circle cx="500" cy="110" r="5" fill="#38bdf8" filter="url(#glowCase)"/>
  <circle cx="680" cy="180" r="6" fill="#7dd3fc" filter="url(#glowCase)"/>
  <circle cx="950" cy="110" r="5" fill="#0ea5e9" filter="url(#glowCase)"/>
</svg>
