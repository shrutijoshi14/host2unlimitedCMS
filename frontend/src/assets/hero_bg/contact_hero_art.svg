<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 280" width="1600" height="280">
  <defs>
    <linearGradient id="contGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="50%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="blueGlowCont" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glowCont" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1600" height="280" fill="url(#contGrad)"/>

  <!-- Orbs Centered at Y=140 -->
  <circle cx="360" cy="140" r="150" fill="#2563eb" opacity="0.35" filter="url(#glowCont)"/>
  <circle cx="800" cy="140" r="160" fill="#3b82f6" opacity="0.25" filter="url(#glowCont)"/>
  <circle cx="1240" cy="140" r="150" fill="#60a5fa" opacity="0.35" filter="url(#glowCont)"/>

  <!-- Grid -->
  <g stroke="#60a5fa" stroke-width="1" opacity="0.2">
    <line x1="0" y1="70" x2="1600" y2="70"/>
    <line x1="0" y1="140" x2="1600" y2="140"/>
    <line x1="0" y1="210" x2="1600" y2="210"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="550" y1="0" x2="550" y2="280"/>
    <line x1="800" y1="0" x2="800" y2="280"/>
    <line x1="1050" y1="0" x2="1050" y2="280"/>
    <line x1="1300" y1="0" x2="1300" y2="280"/>
  </g>

  <!-- Waves -->
  <path d="M 0 110 Q 400 170 800 110 T 1600 130" fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.7" filter="url(#glowCont)"/>
  <path d="M 0 170 Q 450 100 900 170 T 1600 120" fill="none" stroke="#93c5fd" stroke-width="2.5" opacity="0.75" filter="url(#glowCont)"/>

  <!-- Left Side Envelope Icon (Safe Position X=320, Y=95) -->
  <g transform="translate(320, 95)">
    <rect x="0" y="0" width="130" height="90" fill="#0f172a" stroke="#60a5fa" stroke-width="3" rx="10" opacity="0.95" filter="url(#glowCont)"/>
    <path d="M0,0 L65,52 L130,0" fill="none" stroke="#3b82f6" stroke-width="3"/>
    <circle cx="65" cy="52" r="11" fill="url(#blueGlowCont)" filter="url(#glowCont)"/>
  </g>

  <!-- Right Side Location Pin Icon (Safe Position X=1120, Y=90) -->
  <g transform="translate(1120, 90)">
    <circle cx="50" cy="50" r="48" fill="#0f172a" stroke="#60a5fa" stroke-width="3" opacity="0.95" filter="url(#glowCont)"/>
    <path d="M50,18 C39,18 30,27 30,38 C30,52 50,74 50,74 C50,74 70,52 70,38 C70,27 61,18 50,18 Z" fill="url(#blueGlowCont)" filter="url(#glowCont)"/>
    <circle cx="50" cy="34" r="6" fill="#0f172a"/>
  </g>

  <!-- Particles -->
  <circle cx="500" cy="110" r="5" fill="#60a5fa" filter="url(#glowCont)"/>
  <circle cx="680" cy="180" r="6" fill="#93c5fd" filter="url(#glowCont)"/>
  <circle cx="950" cy="110" r="5" fill="#3b82f6" filter="url(#glowCont)"/>
</svg>
