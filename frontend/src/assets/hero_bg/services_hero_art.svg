<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="100%" height="100%">
  <defs>
    <linearGradient id="servicesGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19"/>
      <stop offset="50%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="500" fill="url(#servicesGrad)"/>
  <!-- Abstract Digital Grid & Nodes -->
  <g opacity="0.25">
    <path d="M 0,100 L 1600,100 M 0,200 L 1600,200 M 0,300 L 1600,300 M 0,400 L 1600,400" stroke="#38bdf8" stroke-width="1" stroke-dasharray="8 8"/>
    <path d="M 200,0 L 200,500 M 400,0 L 400,500 M 600,0 L 600,500 M 800,0 L 800,500 M 1000,0 L 1000,500 M 1200,0 L 1200,500 M 1400,0 L 1400,500" stroke="#38bdf8" stroke-width="1" stroke-dasharray="8 8"/>
  </g>
  <!-- Floating Tech Icons & Circuit Nodes -->
  <g transform="translate(150, 100)" opacity="0.7">
    <circle cx="100" cy="150" r="40" fill="none" stroke="#38bdf8" stroke-width="3"/>
    <path d="M70,150 L130,150 M100,120 L100,180" stroke="#38bdf8" stroke-width="3"/>
    <circle cx="400" cy="80" r="30" fill="none" stroke="#818cf8" stroke-width="3"/>
    <rect x="385" y="65" width="30" height="30" fill="none" stroke="#818cf8" stroke-width="3" rx="6"/>
  </g>
  <g transform="translate(1100, 80)" opacity="0.7">
    <polygon points="150,50 200,150 100,150" fill="none" stroke="#38bdf8" stroke-width="3"/>
    <circle cx="150" cy="110" r="20" fill="#38bdf8" opacity="0.3"/>
    <path d="M300,100 C350,50 400,150 450,100" fill="none" stroke="#818cf8" stroke-width="4" stroke-dasharray="10 6"/>
  </g>
</svg>
