<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 280" width="1600" height="280">
  <defs>
    <linearGradient id="priceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="50%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="greenGlowPrice" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glowPrice" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1600" height="280" fill="url(#priceGrad)"/>

  <!-- Orbs -->
  <circle cx="360" cy="140" r="150" fill="#10b981" opacity="0.35" filter="url(#glowPrice)"/>
  <circle cx="800" cy="140" r="160" fill="#059669" opacity="0.25" filter="url(#glowPrice)"/>
  <circle cx="1240" cy="140" r="150" fill="#34d399" opacity="0.35" filter="url(#glowPrice)"/>

  <!-- Grid -->
  <g stroke="#34d399" stroke-width="1" opacity="0.2">
    <line x1="0" y1="70" x2="1600" y2="70"/>
    <line x1="0" y1="140" x2="1600" y2="140"/>
    <line x1="0" y1="210" x2="1600" y2="210"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="550" y1="0" x2="550" y2="280"/>
    <line x1="800" y1="0" x2="800" y2="280"/>
    <line x1="1050" y1="0" x2="1050" y2="280"/>
    <line x1="1300" y1="0" x2="1300" y2="280"/>
  </g>

  <!-- Waves -->
  <path d="M 0 110 Q 400 170 800 110 T 1600 130" fill="none" stroke="#34d399" stroke-width="3" opacity="0.75" filter="url(#glowPrice)"/>
  <path d="M 0 170 Q 450 100 900 170 T 1600 120" fill="none" stroke="#6ee7b7" stroke-width="2.5" opacity="0.8" filter="url(#glowPrice)"/>

  <!-- Left Side Price Tag Icon (Safe Position X=320, Y=92) -->
  <g transform="translate(320, 92)">
    <circle cx="48" cy="48" r="46" fill="#0f172a" stroke="#34d399" stroke-width="2.5" opacity="0.9"/>
    <path d="M24,48 L48,16 L72,16 L72,40 L48,72 Z" fill="url(#greenGlowPrice)" filter="url(#glowPrice)"/>
    <circle cx="60" cy="27" r="5" fill="#0f172a"/>
  </g>

  <!-- Right Side Tier Card Icon (Safe Position X=1120, Y=94) -->
  <g transform="translate(1120, 94)">
    <rect x="0" y="10" width="50" height="72" fill="#0f172a" stroke="#059669" stroke-width="2" rx="6"/>
    <rect x="58" y="0" width="60" height="92" fill="#0f172a" stroke="#34d399" stroke-width="2.5" rx="8" filter="url(#glowPrice)"/>
    <rect x="66" y="12" width="44" height="11" fill="url(#greenGlowPrice)" rx="3"/>
  </g>

  <!-- Particles -->
  <circle cx="500" cy="110" r="5" fill="#34d399" filter="url(#glowPrice)"/>
  <circle cx="680" cy="180" r="6" fill="#6ee7b7" filter="url(#glowPrice)"/>
  <circle cx="950" cy="110" r="5" fill="#10b981" filter="url(#glowPrice)"/>
</svg>
