<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 280" width="1600" height="280">
  <defs>
    <linearGradient id="eduGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c2a4a"/>
      <stop offset="50%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="amberGlowEdu" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glowEdu" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1600" height="280" fill="url(#eduGrad)"/>

  <!-- Orbs Centered at Y=140 -->
  <circle cx="360" cy="140" r="150" fill="#3b82f6" opacity="0.35" filter="url(#glowEdu)"/>
  <circle cx="800" cy="140" r="160" fill="#f59e0b" opacity="0.25" filter="url(#glowEdu)"/>
  <circle cx="1240" cy="140" r="150" fill="#60a5fa" opacity="0.35" filter="url(#glowEdu)"/>

  <!-- Grid -->
  <g stroke="#60a5fa" stroke-width="1" opacity="0.2">
    <line x1="0" y1="70" x2="1600" y2="70"/>
    <line x1="0" y1="140" x2="1600" y2="140"/>
    <line x1="0" y1="210" x2="1600" y2="210"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="550" y1="0" x2="550" y2="280"/>
    <line x1="800" y1="0" x2="800" y2="280"/>
    <line x1="1050" y1="0" x2="1050" y2="280"/>
    <line x1="1300" y1="0" x2="1300" y2="280"/>
  </g>

  <!-- Waves -->
  <path d="M 0 110 Q 400 170 800 110 T 1600 130" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.75" filter="url(#glowEdu)"/>
  <path d="M 0 170 Q 450 100 900 170 T 1600 120" fill="none" stroke="#60a5fa" stroke-width="2.5" opacity="0.8" filter="url(#glowEdu)"/>

  <!-- Left Side Graduation Cap (Math Center Y=140: 104 + 36 = 140) -->
  <g transform="translate(320, 104)">
    <polygon points="60,0 115,22 60,44 5,22" fill="url(#amberGlowEdu)" filter="url(#glowEdu)"/>
    <rect x="38" y="40" width="44" height="20" fill="#f59e0b" rx="3"/>
    <path d="M102,30 L102,58 L106,64" fill="none" stroke="#fef08a" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Right Side Pillars (Math Center Y=140: 95 + 45 = 140) -->
  <g transform="translate(1120, 95)">
    <rect x="0" y="0" width="115" height="90" fill="#0f172a" stroke="#fbbf24" stroke-width="2.5" rx="8" opacity="0.95"/>
    <polygon points="57,9 105,26 9,26" fill="#f59e0b"/>
    <rect x="14" y="34" width="12" height="44" fill="#60a5fa"/>
    <rect x="39" y="34" width="12" height="44" fill="#60a5fa"/>
    <rect x="64" y="34" width="12" height="44" fill="#60a5fa"/>
    <rect x="89" y="34" width="12" height="44" fill="#60a5fa"/>
  </g>

  <!-- Particles -->
  <circle cx="500" cy="110" r="5" fill="#fbbf24" filter="url(#glowEdu)"/>
  <circle cx="680" cy="180" r="6" fill="#60a5fa" filter="url(#glowEdu)"/>
  <circle cx="950" cy="110" r="5" fill="#f59e0b" filter="url(#glowEdu)"/>
</svg>
