<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 280" width="1600" height="280">
  <defs>
    <linearGradient id="blogGradArt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#042f2e"/>
      <stop offset="50%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="tealGlowBlog" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glowBlog" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1600" height="280" fill="url(#blogGradArt)"/>

  <!-- Orbs -->
  <circle cx="360" cy="140" r="150" fill="#0d9488" opacity="0.35" filter="url(#glowBlog)"/>
  <circle cx="800" cy="140" r="160" fill="#2dd4bf" opacity="0.25" filter="url(#glowBlog)"/>
  <circle cx="1240" cy="140" r="150" fill="#14b8a6" opacity="0.35" filter="url(#glowBlog)"/>

  <!-- Grid -->
  <g stroke="#2dd4bf" stroke-width="1" opacity="0.2">
    <line x1="0" y1="70" x2="1600" y2="70"/>
    <line x1="0" y1="140" x2="1600" y2="140"/>
    <line x1="0" y1="210" x2="1600" y2="210"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="550" y1="0" x2="550" y2="280"/>
    <line x1="800" y1="0" x2="800" y2="280"/>
    <line x1="1050" y1="0" x2="1050" y2="280"/>
    <line x1="1300" y1="0" x2="1300" y2="280"/>
  </g>

  <!-- Waves -->
  <path d="M 0 110 Q 400 170 800 110 T 1600 130" fill="none" stroke="#2dd4bf" stroke-width="3" opacity="0.75" filter="url(#glowBlog)"/>
  <path d="M 0 170 Q 450 100 900 170 T 1600 120" fill="none" stroke="#5eead4" stroke-width="2.5" opacity="0.8" filter="url(#glowBlog)"/>

  <!-- Left Side Article Document Icon (Safe Position X=320, Y=92) -->
  <g transform="translate(320, 92)">
    <rect x="0" y="0" width="85" height="96" fill="#0f172a" stroke="#2dd4bf" stroke-width="2.5" rx="8" opacity="0.95" filter="url(#glowBlog)"/>
    <rect x="10" y="10" width="65" height="18" fill="url(#tealGlowBlog)" rx="3"/>
    <line x1="10" y1="38" x2="75" y2="38" stroke="#5eead4" stroke-width="2"/>
    <line x1="10" y1="54" x2="60" y2="54" stroke="#99f6e4" stroke-width="2"/>
    <line x1="10" y1="70" x2="70" y2="70" stroke="#99f6e4" stroke-width="2"/>
  </g>

  <!-- Right Side Line Graph Icon (Safe Position X=1120, Y=94) -->
  <g transform="translate(1120, 94)">
    <rect x="0" y="0" width="125" height="92" fill="#0f172a" stroke="#34d399" stroke-width="2" rx="8"/>
    <path d="M 10 68 Q 36 28 64 45 T 115 14" fill="none" stroke="#2dd4bf" stroke-width="3" filter="url(#glowBlog)"/>
    <circle cx="10" cy="68" r="3" fill="#34d399"/>
    <circle cx="36" cy="33" r="3" fill="#34d399"/>
    <circle cx="64" cy="45" r="3" fill="#2dd4bf"/>
    <circle cx="115" cy="14" r="5" fill="#5eead4" filter="url(#glowBlog)"/>
  </g>

  <!-- Particles -->
  <circle cx="500" cy="110" r="5" fill="#2dd4bf" filter="url(#glowBlog)"/>
  <circle cx="680" cy="180" r="6" fill="#5eead4" filter="url(#glowBlog)"/>
  <circle cx="950" cy="110" r="5" fill="#14b8a6" filter="url(#glowBlog)"/>
</svg>
