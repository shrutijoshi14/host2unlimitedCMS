<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  <!-- Background glass rounded container -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="#ffffff" opacity="0.9" />
  
  <!-- Intersecting technology nodes / infinity shapes -->
  <path d="M 25 50 C 25 35, 45 35, 50 50 C 55 65, 75 65, 75 50 C 75 35, 55 35, 50 50 C 45 65, 25 65, 25 50 Z" 
        fill="none" stroke="url(#blueGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Core server / tech block overlay -->
  <circle cx="50" cy="50" r="10" fill="url(#indigoGrad)" />
  <circle cx="25" cy="50" r="4" fill="#2563eb" />
  <circle cx="75" cy="50" r="4" fill="#06b6d4" />
</svg>